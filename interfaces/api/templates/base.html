<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}U de Chile Fan Dashboard{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&family=Oswald:wght@500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}?v=3.0">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    // Cargar tema guardado antes de renderizar el body para evitar flash
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
    }
</script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo-u">U</span> <span style="font-family: 'Bebas Neue', sans-serif;">DE CHILE STATS</span>
        </div>
        <div class="nav-links" style="display: flex; align-items: center; gap: 1rem;">
            <button id="theme-toggle" onclick="toggleTheme()" style="background: var(--bg-color); border: 2px solid var(--text-primary); cursor: pointer; color: var(--text-primary); display: flex; align-items: center; justify-content: center; padding: 0.5rem; border-radius: 999px; transition: var(--transition-smooth);" title="Cambiar Tema">
                <i data-lucide="moon" id="theme-icon" style="width: 1.2rem; height: 1.2rem;"></i>
            </button>
            <a href="/" style="color: var(--text-primary); text-decoration: none; font-weight: 800; font-family: 'Montserrat', sans-serif;">CATÁLOGO</a>
            <a href="/juego" style="color: var(--text-primary); text-decoration: none; font-weight: 800; font-family: 'Montserrat', sans-serif; text-transform: uppercase;">Dream Team</a>
            {% if current_user %}
                <a href="/dashboard/{{ current_user.id }}" class="btn-primary">MI CAMPAÑA</a>
                <span style="font-size: 0.9rem; color: var(--text-secondary); font-weight: 800; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; gap: 0.25rem;">
                    <i data-lucide="user" style="width: 1.2rem; height: 1.2rem;"></i> <span style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-transform: uppercase;" title="{{ current_user.name }}">{{ current_user.name }}</span>
                </span>
                <a href="/logout" style="color: var(--udechile-red); font-weight: 800; font-family: 'Montserrat', sans-serif; text-decoration: none; font-size: 0.9rem;">SALIR</a>
            {% else %}
                <a href="/login" class="btn-primary">INGRESAR</a>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            const icon = document.getElementById('theme-icon');
            if (icon && savedTheme === 'blue') {
                icon.setAttribute('data-lucide', 'sun');
            }
            lucide.createIcons();
        });

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'blue' ? 'light' : 'blue';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            const icon = document.getElementById('theme-icon');
            if (newTheme === 'blue') {
                icon.setAttribute('data-lucide', 'sun');
            } else {
                icon.setAttribute('data-lucide', 'moon');
            }
            lucide.createIcons();
            
            // Si existe la función para actualizar colores de Chart.js
            if (typeof window.updateChartTheme === 'function') {
                window.updateChartTheme(newTheme);
            }
        }
    </script>
</body>
</html>
